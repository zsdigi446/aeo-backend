services:
  - type: web
    name: aeo-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # 微信支付相关配置（sync: false = 以 Render Dashboard 填写的值为准，Blueprint 更新不覆盖）
      - key: WX_PAY_ENABLED
        sync: false
      - key: WX_MCH_ID
        sync: false
      - key: WX_APP_ID
        sync: false
      - key: WX_API_V3_KEY
        sync: false
      - key: WX_SERIAL_NO
        sync: false
      - key: WX_PRIVATE_KEY
        sync: false
      - key: WX_PAY_NOTIFY_URL
        sync: false
      - key: WX_PAY_AMOUNT
        value: "9900"
        sync: false
      - key: WX_PRODUCT_DESC
        value: "AEO网站完整分析报告"
        sync: false
      # Supabase 持久化（不配置则回退本地 JSON 文件；KEY 用 service_role，勿用 anon）
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
